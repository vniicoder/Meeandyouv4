<!DOCTYPE html>
<html>
<head>
  <title>Good Morning Love</title>
  <style>
    body {
      background: linear-gradient(to right, #ffd6e0, #fff0f5);
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: auto;
    }
    img {
      width: 120px;
      margin: 10px;
    }
    h2 {
      color: #ff4d6d;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Good Morning, My Love ❤️</h2>

  <img src="bubu-dudu-images-bubu-dudu-love.webp">
  <img src="kiss.webp">

  <p>
    I wish I could wake you up with a soft hug today...  
    but for now, take this little message instead 🥺  
  </p>

  <p>
    Just remember — someone far away  
    is thinking about you and smiling like an idiot 💕
  </p>

  <p>
    Now wake up, my sleepy troublemaker 😘
  </p>
</div>

</body>
</html>
